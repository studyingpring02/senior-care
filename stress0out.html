<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쓰레기통 - 박살 서비스</title>
    <style>
        body {
            background-color: #1a1a1a; /* 깊은 어둠 */
            color: #dcdcdc; /* 건조한 회색 */
            font-family: 'Courier New', Courier, monospace; /* 차가운 느낌 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #trash-input-container {
            width: 80%;
            max-width: 500px;
            text-align: center;
        }

        #trash-input {
            width: 100%;
            height: 200px;
            background-color: #2a2a2a; /* 약간 밝은 어둠 */
            border: 2px solid #333; /* 차가운 테두리 */
            border-radius: 8px;
            color: #fff; /* 입력 글자는 하얗게 */
            padding: 15px;
            font-size: 1.2rem;
            resize: none;
            outline: none;
        }

        #trash-input::placeholder {
            color: #777; /* placeholder는 더 어둡게 */
        }

        #crush-button {
            margin-top: 20px;
            padding: 15px 40px;
            background-color: #cc3333; /* 파괴의 빨강 */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        #crush-button:active {
            transform: scale(0.95);
            background-color: #b32a2a;
        }

        #status-message {
            margin-top: 10px;
            font-size: 1rem;
            color: #888;
            height: 20px; /* 고정 높이 */
        }

        /* 박살 연출 애니메이션 (간단) */
        .crushed {
            animation: crush 0.5s ease-out forwards;
        }

        @keyframes crush {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(720deg); /* 회전하며 작아짐 */
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="trash-input-container">
        <h1 style="color: #555;">[진짜 쓰레기통]</h1>
        <textarea id="trash-input" placeholder="무엇이든 쓰세요. 그리고 박살 내세요."></textarea>
        <button id="crush-button">박살!</button>
        <div id="status-message"></div>
    </div>

    <script>
        const inputArea = document.getElementById('trash-input');
        const crushBtn = document.getElementById('crush-button');
        const statusMsg = document.getElementById('status-message');
        // const crushSound = document.getElementById('crush-sound');

        crushBtn.addEventListener('click', () => {
            if (inputArea.value.trim() === '') {
                statusMsg.textContent = '버릴 게 없나요?';
                setTimeout(() => statusMsg.textContent = '', 1000);
                return;
            }

            // 1. 박살 연출 시작
            inputArea.classList.add('crushed');
            // if (crushSound) crushSound.play(); // 소리 재생

            crushBtn.disabled = true;
            statusMsg.textContent = '박살 중...';

            // 2. 애니메이션이 끝난 후 (0.5초) 데이터 소멸 및 초기화
            setTimeout(() => {
                inputArea.value = ''; // 입력창 비우기 (메모리에서도 삭제됨)
                inputArea.classList.remove('crushed'); // 연출 클래스 제거
                crushBtn.disabled = false;
                statusMsg.textContent = '소멸 완료.';

                // 3. 기록의 흔적을 아예 없앰 (중요)
                // console.clear(); // 콘솔 로그 초기화

                // 4. 소멸 메시지 제거
                setTimeout(() => statusMsg.textContent = '', 1000);
            }, 500);
        });

        // 엔터키로 박살내기 기능 (선택)
        inputArea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                crushBtn.click();
            }
        });

    </script>
</body>
</html>
